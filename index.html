<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Surprise</title>
    <meta
      name="description"
      content="A birthday page with a cake, candle, and microphone blow prompt."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Birthday cake scene">
      <section class="start-card" id="startCard">
        <p class="eyebrow">Birthday Surprise</p>
        <h1 class="start-title">A tiny surprise for my favorite girl.</h1>
        
        <button class="start-button" id="startButton" type="button">Start</button>
      </section>

      <section class="scene-card hidden" id="sceneCard">
        <div class="cake-scene" aria-hidden="true">
          <div class="glow"></div>
          <div class="candle">
            <div class="flame" id="flame"></div>
            <div class="wick"></div>
            <div class="wax"></div>
          </div>
          <div class="cake">
            <div class="icing"></div>
            <div class="cake-body"></div>
            <div class="plate"></div>
          </div>
        </div>

        <p class="prompt" id="promptText">Микрофон руу үлээгээрэй</p>
        <div class="meter" aria-hidden="true">
          <div class="meter-track">
            <div class="meter-fill" id="meterFill"></div>
          </div>
        </div>
      </section>

      <section class="reveal-card hidden" id="revealCard">
        <p class="eyebrow">For You</p>
        <h1 class="reveal-title">Happy Birthday My beautiful girlfriend!</h1>
        

        <section class="photo-slider" aria-label="Birthday photo slider">
          <div class="slider-window">
            <div class="slider-track" id="sliderTrack">
              <figure class="slide">
                <img src="1000042482.jpg" alt="Birthday photo 1" class="slide-image" />
                <figcaption class="slide-caption">You make every ordinary day feel warm and special.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042478.jpg" alt="Birthday photo 2" class="slide-image" />
                <figcaption class="slide-caption">My favorite place is always wherever you are.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042480.jpg" alt="Birthday photo 3" class="slide-image" />
                <figcaption class="slide-caption">Your smile is still the prettiest thing I know.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042097.jpg" alt="Birthday photo 4" class="slide-image" />
                <figcaption class="slide-caption">You are beautiful in every moment, even the quiet ones.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042014.jpg" alt="Birthday photo 5" class="slide-image" />
                <figcaption class="slide-caption">Thank you for being the sweetest part of my life.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042009.jpg" alt="Birthday photo 6" class="slide-image" />
                <figcaption class="slide-caption">Loving you feels easy, natural, and endlessly lucky.</figcaption>
              </figure>
              <figure class="slide">
                <img src="1000042012.jpg" alt="Birthday photo 7" class="slide-image" />
                <figcaption class="slide-caption">Happy birthday, my love. You make my world brighter.</figcaption>
              </figure>
            </div>
          </div>

          <div class="slider-dots" id="sliderDots" aria-label="Photo positions">
            <button class="slider-dot active" type="button" data-slide="0" aria-label="Show photo 1"></button>
            <button class="slider-dot" type="button" data-slide="1" aria-label="Show photo 2"></button>
            <button class="slider-dot" type="button" data-slide="2" aria-label="Show photo 3"></button>
            <button class="slider-dot" type="button" data-slide="3" aria-label="Show photo 4"></button>
            <button class="slider-dot" type="button" data-slide="4" aria-label="Show photo 5"></button>
            <button class="slider-dot" type="button" data-slide="5" aria-label="Show photo 6"></button>
            <button class="slider-dot" type="button" data-slide="6" aria-label="Show photo 7"></button>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
